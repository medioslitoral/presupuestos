<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Fondo IMG</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Elimina encabezados, pies y bordes blancos del navegador al imprimir */
    @page {
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
    }

    .pagina {
      position: relative;
      width: 794px;
      margin: 0 auto;
    }

    .pagina img.fondo {
      width: 100%;
      display: block;
    }

    .pagina .contenido {
      position: absolute;
      top: 160px;
      left: 60px;
      right: 60px;
      color: #1a3a5c;
      font-size: 15px;
      line-height: 1.7;
    }

    .contenido p {
      margin-bottom: 14px;
    }

    .contenido a {
      color: #1a73e8;
      text-decoration: underline;
    }

    .btn-print {
      display: flex;
      justify-content: center;
      margin: 24px 0;
    }
    .btn-print button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25577d;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 11px 28px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-print button:hover { background: #1a3f5c; }

    @media print {
      .btn-print { display: none; }
    }
  </style>
</head>
